name: Build Binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override the version embedded into binaries"
        required: false
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Run tests
        run: CGO_ENABLED=0 go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: "386"
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: windows
            goarch: "386"
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Resolve build metadata
        id: meta
        shell: bash
        env:
          VERSION_INPUT: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail

          version="${VERSION_INPUT}"
          if [[ -z "${version}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              version="${GITHUB_REF_NAME}"
            else
              version="$(git describe --tags --abbrev=0 2>/dev/null || true)"
              if [[ -z "${version}" ]]; then
                version="dev-${GITHUB_SHA::7}"
              fi
            fi
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "commit=$(git rev-parse --short HEAD)" >> "${GITHUB_OUTPUT}"
          echo "build_date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Build and package binaries
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.meta.outputs.version }}
          GIT_COMMIT: ${{ steps.meta.outputs.commit }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        run: |
          set -euo pipefail

          mkdir -p dist
          ext=""
          if [[ "${GOOS}" == "windows" ]]; then
            ext=".exe"
          fi

          ldflags="-w -X main.AppVersion=${VERSION} -X main.BuildDate=${BUILD_DATE} -X main.GitCommit=${GIT_COMMIT}"

          for item in "gocron:./cmd/gocron" "gocron-node:./cmd/node"; do
            binary="${item%%:*}"
            package_dir="${binary}-${VERSION}-${GOOS}-${GOARCH}"
            output_dir="dist/${package_dir}"

            mkdir -p "${output_dir}"
            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
              go build -ldflags "${ldflags}" -o "${output_dir}/${binary}${ext}" "${item#*:}"

            if [[ "${GOOS}" == "windows" ]]; then
              (cd dist && zip -rq "${package_dir}.zip" "${package_dir}")
            else
              tar -czf "dist/${package_dir}.tar.gz" -C dist "${package_dir}"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-artifacts/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-artifacts/* \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
